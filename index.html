<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#101216">
<link rel="manifest" href="./manifest.webmanifest">
<link rel="apple-touch-icon" href="./icon.png">
<title>Focus Log</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#101216; --panel:#171a20; --card:#1d2129; --text:#eceef4; --muted:#9aa0af; --faint:#5c6270;
  --line:#262b35; --hair:#1c212a; --accent:#5b8def; --p1:#e5533c; --p2:#f2a65a; --p3:#5b8def; --green:#4fc1a6; }
html,body { background:var(--bg); color:var(--text); font:16px/1.45 -apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif; }
body { max-width:560px; margin:0 auto; }
button { font:inherit; color:inherit; background:none; border:none; cursor:pointer; }
input, select { font:inherit; }
.hidden { display:none !important; }
svg { display:block; }
.ic { display:inline-flex; flex-shrink:0; }

/* ---- chrome ---- */
main { padding:calc(env(safe-area-inset-top) + 6px) 18px 130px; }
.topbar { display:flex; align-items:center; gap:12px; padding:10px 0 0; min-height:30px; }
.topbar .status { margin-left:auto; color:var(--faint); font-size:12px; }
.topbar .rf { color:var(--faint); padding:4px; }
.topbar .rf svg { width:16px; height:16px; }
.big-title { font-size:30px; font-weight:800; letter-spacing:-.03em; margin:10px 0 8px; display:flex; align-items:center; gap:12px; }
.big-title .pdot { width:13px; height:13px; border-radius:5px; flex-shrink:0; }
.big-title .tools { margin-left:auto; display:flex; gap:6px; }
.big-title .tools button { color:var(--faint); padding:6px; }
.big-title .tools svg { width:17px; height:17px; }
.back { color:var(--accent); font-size:15px; padding:8px 0 0; display:inline-flex; align-items:center; gap:3px; }
.back svg { width:15px; height:15px; transform:rotate(180deg); }

.tabbar {
  position:fixed; left:0; right:0; bottom:0; z-index:30;
  display:flex; justify-content:space-around;
  max-width:560px; margin:0 auto;
  background:rgba(22,25,31,.92); -webkit-backdrop-filter:blur(18px); backdrop-filter:blur(18px);
  border-top:1px solid rgba(255,255,255,.06);
  padding:9px 4px calc(env(safe-area-inset-bottom) + 7px);
}
.tabbar button { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; color:var(--faint); position:relative; padding:2px 0; transition:color .15s; }
.tabbar button svg { width:23px; height:23px; }
.tabbar button span.lb { font-size:10px; font-weight:500; letter-spacing:.01em; }
.tabbar button.on { color:var(--accent); }
.tabbar .badge {
  position:absolute; top:-3px; left:calc(50% + 7px);
  background:var(--p1); color:#fff; font-size:10px; font-weight:700;
  border-radius:9px; min-width:17px; height:17px; line-height:17px; text-align:center; padding:0 4px;
  box-shadow:0 0 0 2.5px var(--bg);
}
.fab {
  position:fixed; right:20px; bottom:calc(env(safe-area-inset-bottom) + 78px); z-index:31;
  width:56px; height:56px; border-radius:18px;
  background:linear-gradient(140deg, #6a97f5, #4a77e0); color:#fff;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 10px 26px rgba(74,119,224,.45), 0 2px 6px rgba(0,0,0,.3);
}
.fab svg { width:26px; height:26px; }
.fab:active { transform:scale(.94); }

/* ---- sections & task rows ---- */
.sec-h { display:flex; align-items:baseline; gap:9px; margin:22px 0 2px; }
.sec-h .t { font-size:14.5px; font-weight:700; letter-spacing:-.01em; }
.sec-h.red .t { color:var(--p1); }
.sec-h .c { color:var(--faint); font-size:12.5px; flex:1; }
.sec-h .act { color:var(--p1); font-size:14px; font-weight:600; padding:2px; }
.trow { display:flex; align-items:flex-start; gap:14px; padding:14px 0; border-bottom:1px solid var(--hair); transition:opacity .18s, transform .18s; }
.trow.fading { opacity:0; transform:translateX(12px); }
.tcheck {
  width:22px; height:22px; border-radius:50%; flex-shrink:0; margin-top:1px;
  border:1.8px solid #4a5160; position:relative; transition:background .15s, border-color .15s;
}
.tcheck.p1 { border-color:var(--p1); background:rgba(229,83,60,.13); }
.tcheck.p2 { border-color:var(--p2); background:rgba(242,166,90,.13); }
.tcheck.p3 { border-color:var(--p3); background:rgba(91,141,239,.13); }
.tcheck.checked { background:#4a5160; border-color:#4a5160; }
.tcheck.checked::after {
  content:''; position:absolute; left:6.5px; top:3px;
  width:5px; height:9px;
  border:solid var(--bg); border-width:0 2px 2px 0; transform:rotate(43deg);
}
.tmain { flex:1; min-width:0; }
.tx { font-size:15.5px; line-height:1.4; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; letter-spacing:-.005em; }
.trow.done .tx { color:var(--faint); text-decoration:line-through; }
.desc { color:var(--muted); font-size:13px; margin-top:2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.meta { display:flex; align-items:center; gap:14px; margin-top:5px; font-size:12.5px; color:var(--faint); }
.meta .d { display:inline-flex; align-items:center; gap:4.5px; }
.meta .d svg { width:12.5px; height:12.5px; }
.meta .d.late { color:var(--p1); }
.meta .d.today { color:var(--green); }
.meta .proj { margin-left:auto; display:inline-flex; align-items:center; gap:6px; color:var(--faint); }
.meta .proj i { width:8px; height:8px; border-radius:3px; font-style:normal; }
.tempty { text-align:center; color:var(--faint); padding:38px 20px; font-size:14.5px; line-height:1.6; }
.tempty .e { display:flex; justify-content:center; margin-bottom:14px; color:#39404e; }
.tempty .e svg { width:46px; height:46px; }

/* ---- browse (projects) ---- */
.prow { display:flex; align-items:center; gap:14px; padding:15px 2px; border-bottom:1px solid var(--hair); }
.prow .pic { color:var(--muted); }
.prow .pic svg { width:20px; height:20px; }
.prow .pdot { width:12px; height:12px; border-radius:4.5px; flex-shrink:0; margin:0 4px; }
.prow .nm { flex:1; font-size:15.5px; }
.prow .cnt { color:var(--faint); font-size:13px; }
.prow .chev { color:#39404e; }
.prow .chev svg { width:16px; height:16px; }
.prow.add { color:var(--accent); }
.prow.add .pic { color:var(--accent); }

/* ---- log tab ---- */
.card { background:var(--panel); border:1px solid rgba(255,255,255,.05); border-radius:16px; padding:15px; margin:12px 0; }
.card h2 { font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); margin-bottom:10px; font-weight:600; }
.grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; }
.grid button { display:flex; align-items:center; gap:9px; padding:12px; background:var(--card); border:1px solid rgba(255,255,255,.04); border-radius:12px; color:var(--text); font-size:13.5px; text-align:left; }
.grid button:active { border-color:var(--accent); }
.grid .cdot { width:9px; height:9px; border-radius:3.5px; background:var(--c); flex-shrink:0; }
.in { width:100%; padding:12px 14px; background:var(--card); border:1px solid rgba(255,255,255,.05); border-radius:12px; color:var(--text); font-size:15px; outline:none; margin-top:8px; }
.in:focus { border-color:var(--accent); }
.tl-row { display:flex; align-items:baseline; gap:9px; padding:8px 2px; border-bottom:1px solid var(--hair); font-size:13.5px; }
.tl-row:last-child { border-bottom:none; }
.tl-row .time { color:var(--faint); font-size:12px; font-variant-numeric:tabular-nums; flex-shrink:0; }
.tl-row .cdot { width:8px; height:8px; border-radius:3px; background:var(--c,#7a7f8c); flex-shrink:0; align-self:center; }
.tl-row .note { color:var(--muted); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.tl-row .x { margin-left:auto; color:var(--faint); padding:0 6px; font-size:15px; }
.primary { background:var(--accent); border-radius:12px; color:#fff; padding:13px 16px; font-size:15px; font-weight:600; width:100%; margin-top:10px; }
.center { text-align:center; color:var(--faint); font-size:13px; padding:10px 0; }
select.mini, input.mini { background:var(--card); border:1px solid var(--line); border-radius:10px; color:var(--text); padding:9px 10px; font-size:14px; }

/* ---- bottom sheet ---- */
.sheet-bg { position:fixed; inset:0; background:rgba(0,0,0,.55); z-index:40; opacity:0; transition:opacity .2s; }
.sheet-bg.open { opacity:1; }
.sheet {
  position:fixed; left:0; right:0; bottom:0; z-index:41;
  max-width:560px; margin:0 auto;
  background:#191d25; border-radius:20px 20px 0 0;
  padding:18px 18px calc(env(safe-area-inset-bottom) + 14px);
  transform:translateY(105%); transition:transform .22s ease-out;
  box-shadow:0 -12px 40px rgba(0,0,0,.5);
}
.sheet.open { transform:translateY(0); }
.sheet .grab { width:36px; height:4px; border-radius:2px; background:#333a47; margin:-8px auto 14px; }
#sh-title { width:100%; background:none; border:none; outline:none; color:var(--text); font-size:19px; font-weight:600; letter-spacing:-.01em; }
#sh-title::placeholder { color:var(--faint); }
#sh-desc { width:100%; background:none; border:none; outline:none; color:var(--muted); font-size:14.5px; margin-top:7px; }
#sh-desc::placeholder { color:var(--faint); }
.sh-chips { display:flex; gap:8px; margin-top:18px; overflow-x:auto; -webkit-overflow-scrolling:touch; scrollbar-width:none; padding-bottom:2px; }
.sh-chips::-webkit-scrollbar { display:none; }
.chip {
  display:inline-flex; align-items:center; gap:7px; flex-shrink:0;
  border:1px solid var(--line); border-radius:12px;
  color:var(--muted); font-size:13.5px; font-weight:500; padding:9px 13px;
  position:relative; overflow:hidden;
}
.chip svg { width:15px; height:15px; }
.chip input[type=date] { position:absolute; inset:0; opacity:0; width:100%; }
.chip.green { color:var(--green); border-color:rgba(79,193,166,.4); background:rgba(79,193,166,.07); }
.chip.red { color:var(--p1); border-color:rgba(229,83,60,.4); background:rgba(229,83,60,.07); }
.chip.blue { color:var(--accent); border-color:rgba(91,141,239,.4); background:rgba(91,141,239,.07); }
.chip.pr1 { color:var(--p1); border-color:rgba(229,83,60,.4); background:rgba(229,83,60,.07); }
.chip.pr2 { color:var(--p2); border-color:rgba(242,166,90,.4); background:rgba(242,166,90,.07); }
.chip.pr3 { color:var(--p3); border-color:rgba(91,141,239,.4); background:rgba(91,141,239,.07); }
.chip .clr { position:relative; z-index:2; color:var(--faint); font-size:12px; padding-left:2px; }
.sh-bottom { display:flex; align-items:center; gap:10px; margin-top:18px; }
#sh-proj { background:var(--card); border:1px solid var(--line); border-radius:12px; color:var(--muted); padding:10px 11px; font-size:14px; max-width:55%; }
#sh-del { color:var(--p1); padding:8px; }
#sh-del svg { width:19px; height:19px; }
#sh-save {
  margin-left:auto; width:46px; height:46px; border-radius:15px;
  background:linear-gradient(140deg, #6a97f5, #4a77e0); color:#fff;
  display:flex; align-items:center; justify-content:center;
  box-shadow:0 6px 16px rgba(74,119,224,.4);
}
#sh-save svg { width:20px; height:20px; }
#sh-save:active { transform:scale(.94); }

/* ---- setup ---- */
#setup { padding:14vh 20px 0; }
#setup h1 { font-size:24px; font-weight:800; margin-bottom:16px; display:flex; align-items:center; gap:10px; }
#setup h1 .dot { width:13px; height:13px; border-radius:5px; background:var(--accent); }
#setup p { color:var(--muted); font-size:14.5px; margin:10px 0; }

.toast { position:fixed; bottom:calc(env(safe-area-inset-bottom) + 92px); left:50%; transform:translateX(-50%); background:#232834; border:1px solid var(--line); border-radius:12px; padding:11px 18px; font-size:13.5px; z-index:60; white-space:nowrap; box-shadow:0 8px 24px rgba(0,0,0,.4); }
</style>
</head>
<body>
<div id="setup" class="hidden">
  <h1><span class="dot"></span>Focus Log</h1>
  <div class="card">
    <h2>Подключение</h2>
    <p>Вставьте ключ синхронизации из приложения на компьютере (Settings → Sync → Copy phone link, или сам ключ).</p>
    <input type="text" class="in" id="key-input" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx" autocapitalize="off" autocorrect="off">
    <button class="primary" id="key-save">Подключить</button>
  </div>
</div>

<div id="app" class="hidden">
  <main>
    <div class="topbar"><span class="status" id="status"></span><button class="rf" id="refresh"></button></div>
    <div id="view"></div>

    <div id="pane-log" class="hidden">
      <div class="big-title">Лог</div>
      <div class="card">
        <h2>План на сегодня <span id="plan-progress" style="color:var(--accent)"></span></h2>
        <div id="plan-list"></div>
      </div>
      <div class="card">
        <h2>Что делал последние 15 минут?</h2>
        <div class="grid" id="cats"></div>
        <input type="text" class="in" id="note" placeholder="Деталь (необязательно), затем категория" enterkeyhint="send">
      </div>
      <div class="card">
        <h2>Сегодня <span id="counts" style="color:var(--faint);text-transform:none;letter-spacing:0"></span></h2>
        <div id="timeline"><p class="center">Пока пусто.</p></div>
      </div>
      <div class="card" id="push-card">
        <h2>Напоминания на этом телефоне</h2>
        <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
          <select id="push-interval" class="mini">
            <option value="15">каждые 15 мин</option>
            <option value="30">каждые 30 мин</option>
            <option value="45">каждые 45 мин</option>
            <option value="60">каждый час</option>
          </select>
          <input type="time" id="push-start" value="09:00" class="mini">
          <span style="color:var(--faint)">–</span>
          <input type="time" id="push-end" value="19:00" class="mini">
        </div>
        <button class="primary" id="push-btn">Включить напоминания</button>
        <p class="center" id="push-status"></p>
      </div>
    </div>
  </main>

  <button class="fab" id="fab"></button>

  <nav class="tabbar">
    <button data-tab="log"><span class="ic tb-timer"></span><span class="lb">Лог</span></button>
    <button data-tab="today"><span class="ic tb-sun"></span><span class="lb">Сегодня</span><span class="badge hidden" id="badge-today"></span></button>
    <button data-tab="upcoming"><span class="ic tb-cal"></span><span class="lb">Далее</span></button>
    <button data-tab="inbox"><span class="ic tb-inbox"></span><span class="lb">Входящие</span></button>
    <button data-tab="browse"><span class="ic tb-list"></span><span class="lb">Проекты</span></button>
  </nav>

  <div class="sheet-bg hidden" id="sheet-bg"></div>
  <div class="sheet" id="sheet">
    <div class="grab"></div>
    <input id="sh-title" placeholder="Название задачи" autocomplete="off">
    <input id="sh-desc" placeholder="Описание" autocomplete="off">
    <div class="sh-chips">
      <button class="chip" id="sh-date"><span class="ic ch-cal"></span><span id="sh-date-l">Сегодня</span><input type="date" id="sh-date-in"><span class="clr hidden" id="sh-date-x">✕</span></button>
      <button class="chip" id="sh-dl"><span class="ic ch-alarm"></span><span id="sh-dl-l">Дедлайн</span><input type="date" id="sh-dl-in"><span class="clr hidden" id="sh-dl-x">✕</span></button>
      <button class="chip" id="sh-prio"><span class="ic ch-flag"></span><span id="sh-prio-l">Приоритет</span></button>
    </div>
    <div class="sh-bottom">
      <select id="sh-proj"></select>
      <button id="sh-del" class="hidden"></button>
      <button id="sh-save"></button>
    </div>
  </div>
</div>

<script>
/* ---------- icon set (Lucide-style, stroke, currentColor) ---------- */
function svgIcon(inner, vb){
  return '<svg viewBox="' + (vb||'0 0 24 24') + '" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">' + inner + '</svg>';
}
var I = {
  sun: svgIcon('<circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>'),
  cal: svgIcon('<rect x="3" y="4" width="18" height="17" rx="3"/><path d="M16 2v4M8 2v4M3 9.5h18"/>'),
  calDays: svgIcon('<rect x="3" y="4" width="18" height="17" rx="3"/><path d="M16 2v4M8 2v4M3 9.5h18M8 14h.01M12 14h.01M16 14h.01M8 17.5h.01M12 17.5h.01"/>'),
  inbox: svgIcon('<path d="M22 13h-5.5l-2 3h-5l-2-3H2"/><path d="M5.4 5.9 2 13v5a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2v-5l-3.4-7.1A2 2 0 0 0 16.8 4.7H7.2a2 2 0 0 0-1.8 1.2z"/>'),
  timer: svgIcon('<path d="M10 2h4"/><path d="M12 14l3-3"/><circle cx="12" cy="14" r="8"/>'),
  list: svgIcon('<path d="M8 6h13M8 12h13M8 18h13"/><path d="M3.5 6h.01M3.5 12h.01M3.5 18h.01" stroke-width="2.6"/>'),
  plus: svgIcon('<path d="M12 5v14M5 12h14"/>'),
  flag: svgIcon('<path d="M4 15s1-1 4-1 5 2 8 2 4-1 4-1V3s-1 1-4 1-5-2-8-2-4 1-4 1z"/><path d="M4 22v-7"/>'),
  alarm: svgIcon('<circle cx="12" cy="13" r="8"/><path d="M12 9.5v3.8l2.2 2.2"/><path d="M5 3 2 6M22 6l-3-3"/>'),
  pencil: svgIcon('<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>'),
  trash: svgIcon('<path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>'),
  chev: svgIcon('<path d="m9 18 6-6-6-6"/>'),
  refresh: svgIcon('<path d="M21 12a9 9 0 1 1-2.64-6.36"/><path d="M21 3v6h-6"/>'),
  send: svgIcon('<path d="M12 19V5M5 12l7-7 7 7"/>'),
  zen: svgIcon('<circle cx="12" cy="12" r="9"/><path d="m8.5 12.5 2.3 2.3 4.7-5.1"/>'),
  folder: svgIcon('<path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.9a2 2 0 0 1-1.7-.9L9.2 3.9A2 2 0 0 0 7.5 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>')
};
function ic(name, cls){
  var s=document.createElement('span');
  s.className='ic'+(cls?' '+cls:'');
  s.innerHTML=I[name];
  return s;
}

var CATS = [
  ["Deep work","deep","#5B8DEF"],["Встреча / звонок","meeting","#B47AEA"],
  ["Рутина / переписка","admin","#F2A65A"],["Планирование","planning","#4FC1A6"],
  ["Контент / тексты","content","#E86A92"],["Ресёрч","research","#58B7D4"],
  ["Учёба","learning","#9CCC65"],["Перерыв","break","#8D99AE"],
  ["Семья / личное","personal","#F4C95D"],["Отвлёкся","distracted","#E5533C"]
];
var COLORS = {}; CATS.forEach(function(c){ COLORS[c[1]] = c[2]; });
var PRIO_NAMES = { 1:"П1", 2:"П2", 3:"П3" };
var PROJECT_COLORS = ["#e5533c","#f2a65a","#f4c95d","#4fc1a6","#58b7d4","#5b8def","#b47aea","#e86a92"];
var API = (location.hostname.indexOf(".supabase.co") >= 0 && location.pathname.indexOf("/functions/") === 0)
  ? "."
  : "https://nmpomxomlhxyywgbgpfd.supabase.co/functions/v1/focuslog";
var state = { entries:[], plans:{}, tab:"today", projView:null, sheet:null };

function $(id){ return document.getElementById(id); }
function uuid(){ return crypto.randomUUID(); }
function pad(n){ return (n<10?"0":"")+n; }
function dkOf(d){ return d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()); }
function todayKey(){ return dkOf(new Date()); }
function dayPlus(n){ var d=new Date(); return dkOf(new Date(d.getFullYear(), d.getMonth(), d.getDate()+n)); }
function hm(iso){ var d=new Date(iso); return pad(d.getHours())+":"+pad(d.getMinutes()); }
function isDayKey(s){ return /^\d{4}-\d{2}-\d{2}$/.test(s); }
var toastTimer;
function toast(msg){ var t=document.createElement("div"); t.className="toast"; t.textContent=msg;
  document.body.appendChild(t); clearTimeout(toastTimer); toastTimer=setTimeout(function(){ t.remove(); },2400);
  document.querySelectorAll(".toast").forEach(function(x){ if(x!==t) x.remove(); }); }

function getKey(){ return localStorage.getItem("focuslog-key"); }

function req(path, opts){
  opts = opts || {};
  opts.headers = Object.assign({ "x-sync-key": getKey(), "content-type": "application/json" }, opts.headers||{});
  return fetch(API+path, opts).then(function(r){
    if(!r.ok) return r.json().catch(function(){ return {}; }).then(function(b){ throw new Error(b.error||("HTTP "+r.status)); });
    return r.json();
  });
}

function pull(){

    state.plans = {};

function pushEntries(entries){

function itemsOf(day){ if(!state.plans[day]) state.plans[day]=[]; return state.plans[day]; }
function pushDay(day){

    .catch(function(err){ toast("Не ушло в облако: "+err.message); });

function projects(){ return state.plans["projects"]||[]; }

/* ---------- dates & quick-add parsing ---------- */

var WD = { "пн":1,"вт":2,"ср":3,"чт":4,"пт":5,"сб":6,"вс":0,
  "понедельник":1,"вторник":2,"среда":3,"среду":3,"четверг":4,"пятница":5,"пятницу":5,"суббота":6,"субботу":6,"воскресенье":0,
  "mon":1,"tue":2,"wed":3,"thu":4,"fri":5,"sat":6,"sun":0 };

function dateFromToken(tok){
  var t = tok.toLowerCase().replace(/[,.!?]+$/,"");
  var now = new Date();
  if(t==="сегодня"||t==="today") return dayPlus(0);
  if(t==="завтра"||t==="tomorrow"||t==="tmr") return dayPlus(1);
  if(t==="послезавтра") return dayPlus(2);
  if(t in WD){ var diff=(WD[t]-now.getDay()+7)%7; if(!diff) diff=7; return dayPlus(diff); }
  var m = t.match(/^(\d{1,2})[./](\d{1,2})(?:[./](\d{2,4}))?$/);
  if(m){
    var d=+m[1], mo=+m[2];
    if(d<1||d>31||mo<1||mo>12) return null;
    var y = m[3] ? (+m[3]<100 ? 2000+ +m[3] : +m[3]) : now.getFullYear();
    var dt = new Date(y, mo-1, d);
    if(!m[3] && dt < new Date(now.getFullYear(), now.getMonth(), now.getDate())) dt = new Date(y+1, mo-1, d);
    return dkOf(dt);
  }
  return null;
}

function fmtDay(dk){
  if(dk===todayKey()) return "Сегодня";
  if(dk===dayPlus(1)) return "Завтра";
  var p = dk.split("-");
  return new Date(+p[0], +p[1]-1, +p[2]).toLocaleDateString("ru-RU", { weekday:"short", day:"numeric", month:"short" }).replace(/\.$/,"");
}

function parseQuick(raw){
  var out = { text:"", date:null, deadline:null, priority:null, projectId:null };
  var toks = raw.trim().split(/\s+/), kept=[];
  for(var i=0;i<toks.length;i++){
    var tok=toks[i], low=tok.toLowerCase();
    var pm = low.match(/^[!pп]([1-3])$/);
    if(pm){ out.priority=+pm[1]; continue; }
    if(tok.charAt(0)==="#" && tok.length>1){
      var q=low.slice(1);
      var pr=projects().filter(function(p){ return p.text.toLowerCase().replace(/\s+/g,"").indexOf(q)===0; })[0];
      if(pr){ out.projectId=pr.id; continue; }
    }
    if((low==="до"||low==="by"||low==="к") && i+1<toks.length){
      var dd=dateFromToken(toks[i+1]);
      if(dd){ out.deadline=dd; i++; continue; }
    }
    if((low==="через" && (toks[i+1]||"").toLowerCase().indexOf("недел")===0) ||
       (low==="next" && (toks[i+1]||"").toLowerCase()==="week")){
      out.date=dayPlus(7); i++; continue;
    }
    var dt=dateFromToken(tok);
    if(dt && !out.date){ out.date=dt; continue; }
    kept.push(tok);
  }
  out.text = kept.join(" ");
  return out;
}

/* ---------- task data helpers ---------- */

function overdueList(pf){
  var tk=todayKey(), out=[];
  Object.keys(state.plans).forEach(function(day){
    if(!isDayKey(day) || day>=tk) return;
    (state.plans[day]||[]).forEach(function(it){
      if(!it.done && (!pf || it.projectId===pf)) out.push({ day:day, item:it });
    });
  });
  out.sort(function(a,b){ return a.day<b.day?-1:1; });
  return out;
}
function dayTasks(dk, pf, all){
  return (state.plans[dk]||[]).filter(function(i){ return (!pf||i.projectId===pf)&&(all||!i.done); })
    .map(function(it){ return { day:dk, item:it }; });
}
function openTodayCount(){
  var n=overdueList(null).length;
  (state.plans[todayKey()]||[]).forEach(function(i){ if(!i.done) n++; });
  return n;
}
function projOpenCount(pid){
  var n=0;
  Object.keys(state.plans).forEach(function(day){
    if(day!=="inbox" && !isDayKey(day)) return;
    (state.plans[day]||[]).forEach(function(i){ if(!i.done && i.projectId===pid) n++; });
  });
  return n;
}
function rescheduleOverdue(pf){
  var tk=todayKey(), touched={};
  overdueList(pf).forEach(function(o){
    state.plans[o.day] = (state.plans[o.day]||[]).filter(function(i){ return i.id!==o.item.id; });
    itemsOf(tk).push(o.item);
    touched[o.day]=true; touched[tk]=true;
  });
  Object.keys(touched).forEach(pushDay);
  render();
}

/* ---------- rendering ---------- */

function bySort(a,b){ return (a.item.priority||9)-(b.item.priority||9); }

function metaDate(iconName, text, cls){
  var s=document.createElement("span");
  s.className="d"+(cls?" "+cls:"");
  s.appendChild(ic(iconName));
  s.appendChild(document.createTextNode(text));
  return s;
}

function rowEl(entry, opts){
  opts = opts||{};
  var day=entry.day, item=entry.item;
  var row=document.createElement("div"); row.className="trow"+(item.done?" done":"");
  var check=document.createElement("button");
  check.className="tcheck"+(item.priority?" p"+item.priority:"")+(item.done?" checked":"");
  check.onclick=function(ev){
    ev.stopPropagation();
    row.classList.add("fading");
    setTimeout(function(){
      item.done=!item.done;
      pushDay(day); render();
    }, 180);
  };
  var main=document.createElement("div"); main.className="tmain";
  var tx=document.createElement("div"); tx.className="tx"; tx.textContent=item.text;
  main.appendChild(tx);
  if(item.note){ var ds=document.createElement("div"); ds.className="desc"; ds.textContent=item.note; main.appendChild(ds); }
  var meta=document.createElement("div"); meta.className="meta";
  if(day!=="inbox" && (opts.showDate || day<todayKey())){
    meta.appendChild(metaDate("cal", fmtDay(day), day<todayKey()?"late":(day===todayKey()?"today":"")));
  }
  if(item.deadline){
    meta.appendChild(metaDate("alarm", fmtDay(item.deadline), item.deadline<=todayKey()&&!item.done?"late":""));
  }
  var pr=projById(item.projectId);
  if(pr && !opts.hideProj){
    var ps=document.createElement("span"); ps.className="proj";
    var pd=document.createElement("i"); pd.style.background=pr.color||"#7a7f8c";
    ps.appendChild(pd); ps.appendChild(document.createTextNode(pr.text));
    meta.appendChild(ps);
  }
  if(meta.children.length) main.appendChild(meta);
  row.appendChild(check); row.appendChild(main);
  row.onclick=function(){ openSheet({ mode:"edit", day:day, item:item }); };
  return row;
}

function secEl(title, entries, opts){
  opts=opts||{};
  var wrap=document.createElement("div");
  if(title){
    var h=document.createElement("div"); h.className="sec-h"+(opts.red?" red":"");
    var t=document.createElement("span"); t.className="t"; t.textContent=title;
    var c=document.createElement("span"); c.className="c"; c.textContent=entries.length||"";
    h.appendChild(t); h.appendChild(c);
    if(opts.act && entries.length){
      var a=document.createElement("button"); a.className="act"; a.textContent=opts.act;
      a.onclick=opts.onAct;
      h.appendChild(a);
    }
    wrap.appendChild(h);
  }
  entries.slice().sort(bySort).forEach(function(e){ wrap.appendChild(rowEl(e, opts)); });
  if(!entries.length && opts.empty){
    var p=document.createElement("div"); p.className="tempty";
    var e=document.createElement("div"); e.className="e"; e.innerHTML=I[opts.emptyIcon||"zen"];
    p.appendChild(e); p.appendChild(document.createTextNode(opts.empty));
    wrap.appendChild(p);
  }
  return wrap;
}

function bigTitle(text, dotColor){
  var h=document.createElement("div"); h.className="big-title";
  if(dotColor){ var d=document.createElement("span"); d.className="pdot"; d.style.background=dotColor; h.appendChild(d); }
  h.appendChild(document.createTextNode(text));
  return h;
}

function renderToday(view){
  view.appendChild(bigTitle("Сегодня"));
  var over=overdueList(null);
  if(over.length) view.appendChild(secEl("Просрочено", over, { red:true, act:"Перенести → сегодня", onAct:function(){ rescheduleOverdue(null); }, showDate:true }));
  var todays=dayTasks(todayKey(), null, true);
  view.appendChild(secEl(over.length?"Сегодня":"", todays, { empty: over.length?"На сегодня ничего не запланировано.":"Всё чисто. Наслаждайся фокусом.", emptyIcon:"zen" }));
}

function renderUpcoming(view){
  view.appendChild(bigTitle("Предстоящее"));
  var over=overdueList(null);
  if(over.length) view.appendChild(secEl("Просрочено", over, { red:true, act:"Перенести → сегодня", onAct:function(){ rescheduleOverdue(null); }, showDate:true }));
  view.appendChild(secEl("Сегодня", dayTasks(todayKey(), null), { empty:"Свободно." }));
  var seen={}; var days=[dayPlus(1)]; seen[dayPlus(1)]=true;
  Object.keys(state.plans).forEach(function(dk){
    if(isDayKey(dk) && dk>todayKey() && !seen[dk]){ seen[dk]=true; days.push(dk); }
  });
  days.sort().forEach(function(dk){
    var ts=dayTasks(dk, null);
    if(dk!==dayPlus(1) && !ts.length) return;
    view.appendChild(secEl(fmtDay(dk), ts, { empty: dk===dayPlus(1)?"Свободно.":null }));
  });
}

function renderInbox(view){
  view.appendChild(bigTitle("Входящие"));
  var items=(state.plans["inbox"]||[]).filter(function(i){ return !i.done; }).map(function(it){ return { day:"inbox", item:it }; });
  view.appendChild(secEl("", items, { empty:"Входящие пусты. Сюда падает всё, что без даты — жми плюс и вываливай из головы.", emptyIcon:"inbox" }));
}

function renderBrowse(view){
  if(state.projView){
    var proj=projById(state.projView);
    if(!proj){ state.projView=null; renderBrowse(view); return; }
    var back=document.createElement("button"); back.className="back";

    back.onclick=function(){ state.projView=null; render(); };

    var title=bigTitle(proj.text, proj.color||"#7a7f8c");
    var tools=document.createElement("span"); tools.className="tools";
    var ren=document.createElement("button"); ren.appendChild(ic("pencil"));
    ren.onclick=function(){
      var name=prompt("Название проекта:", proj.text);
      if(!name||!name.trim()) return;
      proj.text=name.trim(); pushDay("projects"); render();
    };
    var del=document.createElement("button"); del.appendChild(ic("trash"));
    del.onclick=function(){
      if(!confirm("Удалить проект «"+proj.text+"»? Задачи останутся, но без проекта.")) return;
      state.plans["projects"]=projects().filter(function(p){ return p.id!==proj.id; });
      state.projView=null; pushDay("projects"); render();
    };
    tools.appendChild(ren); tools.appendChild(del);
    title.appendChild(tools);
    view.appendChild(title);
    var pf=proj.id;
    var over=overdueList(pf);
    if(over.length) view.appendChild(secEl("Просрочено", over, { red:true, act:"→ сегодня", onAct:function(){ rescheduleOverdue(pf); }, showDate:true, hideProj:true }));
    var td=dayTasks(todayKey(), pf);
    if(td.length) view.appendChild(secEl("Сегодня", td, { hideProj:true }));
    var up=[];
    Object.keys(state.plans).sort().forEach(function(dk){ if(isDayKey(dk)&&dk>todayKey()) up=up.concat(dayTasks(dk, pf)); });
    if(up.length) view.appendChild(secEl("Предстоящее", up, { showDate:true, hideProj:true }));
    var someday=(state.plans["inbox"]||[]).filter(function(i){ return !i.done&&i.projectId===pf; }).map(function(it){ return { day:"inbox", item:it }; });
    view.appendChild(secEl("Без даты", someday, { hideProj:true, empty: (over.length+td.length+up.length)?null:"В проекте пока пусто." }));
    return;
  }
  view.appendChild(bigTitle("Проекты"));
  var list=document.createElement("div");
  var inboxRow=document.createElement("div"); inboxRow.className="prow";
  inboxRow.appendChild(ic("inbox","pic"));
  var inm=document.createElement("span"); inm.className="nm"; inm.textContent="Входящие";
  var inc=document.createElement("span"); inc.className="cnt";
  inc.textContent=(state.plans["inbox"]||[]).filter(function(i){return !i.done;}).length||"";
  inboxRow.appendChild(inm); inboxRow.appendChild(inc); inboxRow.appendChild(ic("chev","chev"));
  inboxRow.onclick=function(){ setTab("inbox"); };
  list.appendChild(inboxRow);
  projects().forEach(function(p){
    var r=document.createElement("div"); r.className="prow";
    var d=document.createElement("span"); d.className="pdot"; d.style.background=p.color||"#7a7f8c";
    var nm=document.createElement("span"); nm.className="nm"; nm.textContent=p.text;
    var cn=document.createElement("span"); cn.className="cnt"; cn.textContent=projOpenCount(p.id)||"";
    r.appendChild(d); r.appendChild(nm); r.appendChild(cn);
    r.appendChild(ic("chev","chev"));
    r.onclick=function(){ state.projView=p.id; render(); };
    list.appendChild(r);
  });
  var add=document.createElement("div"); add.className="prow add";
  add.appendChild(ic("plus","pic"));
  var an=document.createElement("span"); an.className="nm"; an.textContent="Новый проект";
  add.appendChild(an);
  add.onclick=function(){
    var name=prompt("Название проекта:");
    if(!name||!name.trim()) return;
    var items=itemsOf("projects");
    items.push({ id:uuid(), text:name.trim(), done:false, color:PROJECT_COLORS[items.length%PROJECT_COLORS.length] });
    pushDay("projects"); render();
  };
  list.appendChild(add);
  view.appendChild(list);
}

function renderLogPlan(){
  var pl=$("plan-list"); pl.innerHTML="";
  var items=state.plans[todayKey()]||[];
  var done=items.filter(function(i){ return i.done; }).length;
  $("plan-progress").textContent = items.length ? done+"/"+items.length : "";
  if(!items.length){ pl.innerHTML='<p class="center">План пуст — добавь задачи через плюс.</p>'; return; }
  items.forEach(function(item){
    pl.appendChild(rowEl({ day:todayKey(), item:item }, {}));
  });

function renderLog(){
  renderLogPlan();
  var cats=$("cats");
  if(!cats.children.length){
    CATS.forEach(function(c){
      var b=document.createElement("button"); b.style.setProperty("--c",c[2]);
      var d=document.createElement("span"); d.className="cdot";
      b.appendChild(d); b.appendChild(document.createTextNode(c[0]));
      b.onclick=function(){ logCategory(c); };
      cats.appendChild(b);
    });
  }
  var tl=$("timeline"); tl.innerHTML="";
  var es=state.entries.slice().sort(function(a,b){ return new Date(b.slotStart)-new Date(a.slotStart); });
  $("counts").textContent = es.length ? "· "+es.filter(function(e){return !e.skipped;}).length+" записей" : "";
  if(!es.length){ tl.innerHTML='<p class="center">Пока пусто.</p>'; return; }
  es.forEach(function(e){
    var row=document.createElement("div"); row.className="tl-row";
    var t=document.createElement("span"); t.className="time"; t.textContent=hm(e.slotStart)+"–"+hm(e.slotEnd);
    var d=document.createElement("span"); d.className="cdot"; d.style.setProperty("--c", COLORS[e.category]||"#7a7f8c");
    var lb=document.createElement("span"); lb.textContent=e.skipped?"пропущено":(e.label||e.category);
    row.appendChild(t); row.appendChild(d); row.appendChild(lb);
    if(e.note){ var n=document.createElement("span"); n.className="note"; n.textContent=e.note; row.appendChild(n); }

    x.onclick=function(){ delEntry(e); };
    row.appendChild(x);
    tl.appendChild(row);
  });

function logCategory(cat){
  var now = new Date();
  var e = {
    id: uuid(), day: todayKey(),
    slotStart: new Date(now - 15*60000).toISOString(), slotEnd: now.toISOString(),
    loggedAt: now.toISOString(), category: cat[1], label: cat[0],
    note: $("note").value.trim() || null, focus: null,
    skipped:false, missed:false, snoozed:false, appTitle:null, deleted:false
  };
  state.entries.push(e); $("note").value=""; renderLog();
  pushEntries([e]).then(function(){ toast("Записано: "+cat[0]); })
    .catch(function(err){ toast("Не ушло: "+err.message); });
}
function delEntry(e){
  e.deleted = true;
  state.entries = state.entries.filter(function(x){ return x.id!==e.id; });
  renderLog();
  pushEntries([e]).catch(function(err){ toast("Не ушло: "+err.message); });
}

function render(){
  var badge=$("badge-today");
  var n=openTodayCount();
  badge.textContent=n; badge.classList.toggle("hidden", !n);
  document.querySelectorAll(".tabbar button").forEach(function(b){
    b.classList.toggle("on", b.dataset.tab===state.tab);
  });
  var view=$("view");
  $("pane-log").classList.toggle("hidden", state.tab!=="log");
  view.classList.toggle("hidden", state.tab==="log");
  if(state.tab==="log"){ renderLog(); return; }
  view.innerHTML="";
  if(state.tab==="today") renderToday(view);
  else if(state.tab==="upcoming") renderUpcoming(view);
  else if(state.tab==="inbox") renderInbox(view);
  else renderBrowse(view);
}

function sheetSave(){
  if(!sh) return;
  var title=$("sh-title").value.trim();
  var desc=$("sh-desc").value.trim()||null;
  if(sh.mode==="add"){
    var p=parseQuick(title);
    if(!p.text){ toast("Напиши название задачи"); return; }
    var day = p.date || sh.date || null;
    var owner = day || "inbox";
    itemsOf(owner).push({
      id: uuid(), text: p.text, done:false, note: desc,
      priority: p.priority || sh.priority || null,
      projectId: p.projectId || sh.projectId || null,
      deadline: p.deadline || sh.deadline || null
    });
    pushDay(owner);
  } else {
    if(!title){ toast("Название не может быть пустым"); return; }
    var item=sh.item;
    item.text=title; item.note=desc;
    item.priority=sh.priority; item.projectId=sh.projectId; item.deadline=sh.deadline;
    var newDay = sh.date || "inbox";
    var touched={}; touched[sh.origDay]=true;
    if(newDay!==sh.origDay){
      state.plans[sh.origDay]=(state.plans[sh.origDay]||[]).filter(function(i){ return i.id!==item.id; });
      itemsOf(newDay).push(item);
      touched[newDay]=true;
    }
    Object.keys(touched).forEach(pushDay);
  }
  closeSheet(); render();
}
function sheetDelete(){
  if(!sh||sh.mode!=="edit") return;
  state.plans[sh.origDay]=(state.plans[sh.origDay]||[]).filter(function(i){ return i.id!==sh.item.id; });
  pushDay(sh.origDay);
  closeSheet(); render();
}

  $("sh-title").addEventListener("input", function(){

    if(p.date){ sh.date=p.date; shSetDateChip(); }
    if(p.deadline){ sh.deadline=p.deadline; shSetDlChip(); }

    if(p.projectId){ sh.projectId=p.projectId; shFillProjects(); }
  });
  $("sh-date-in").addEventListener("change", function(){ sh.date=this.value||null; shSetDateChip(); });
  $("sh-date-x").addEventListener("click", function(e){ e.stopPropagation(); sh.date=null; shSetDateChip(); });
  $("sh-dl-in").addEventListener("change", function(){ sh.deadline=this.value||null; shSetDlChip(); });
  $("sh-dl-x").addEventListener("click", function(e){ e.stopPropagation(); sh.deadline=null; shSetDlChip(); });
  $("sh-prio").addEventListener("click", function(){
    sh.priority = sh.priority===null?1:(sh.priority===3?null:sh.priority+1);
    shSetPrioChip();
  });
  $("sh-proj").addEventListener("change", function(){ sh.projectId=this.value||null; });

  $("note").addEventListener("keydown", function(ev){
    if(ev.key==="Enter" && $("note").value.trim()) logCategory(["Другое","other","#7A7F8C"]);
  });
  $("refresh").onclick=pull;
  $("key-save").onclick=function(){
    var k=$("key-input").value.trim().toLowerCase();
    if(!/^[0-9a-f-]{36}$/.test(k)){ toast("Не похоже на ключ синхронизации."); return; }
    localStorage.setItem("focuslog-key", k); boot();
  };
  boot();
});

function boot(){
  // only the function-path URL needs the trailing-slash canonicalization
  if(location.hostname.indexOf(".supabase.co")>=0 && location.pathname.indexOf("/functions/")===0 && !location.pathname.endsWith("/")){ location.replace(location.pathname+"/"+location.search+location.hash); return; }
  // accept the key from #key=… or ?key=… (messengers often strip fragments)
  var m=(location.hash||"").match(/key=([0-9a-fA-F-]{36})/) || (location.search||"").match(/key=([0-9a-fA-F-]{36})/);
  if(m){ localStorage.setItem("focuslog-key", m[1].toLowerCase()); history.replaceState(null,"",location.pathname); }
  if(!getKey()){ $("setup").classList.remove("hidden"); $("app").classList.add("hidden"); return; }
  $("setup").classList.add("hidden"); $("app").classList.remove("hidden");
  render(); pull();
  setInterval(pull, 3*60*1000);
  document.addEventListener("visibilitychange", function(){ if(!document.hidden) pull(); });
  initPush();
}

/* ---- push reminders ---- */
var swReg = null;

function pushSupported(){ return "serviceWorker" in navigator && "PushManager" in window && "Notification" in window; }
function isIosNotInstalled(){
  var ios = /iphone|ipad|ipod/i.test(navigator.userAgent);
  var standalone = window.matchMedia("(display-mode: standalone)").matches || navigator.standalone === true;
  return ios && !standalone;
}

function b64ToBytes(b64){
  var pad = "=".repeat((4 - b64.length % 4) % 4);
  var raw = atob((b64 + pad).replace(/-/g, "+").replace(/_/g, "/"));
  var arr = new Uint8Array(raw.length);
  for (var i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  return arr;
}

function setPushUI(enabled, note){
  $("push-btn").textContent = enabled ? "Disable reminders" : "🔔 Enable reminders";
  $("push-status").textContent = note || (enabled ? "Reminders are on for this device." : "");
}

function initPush(){
  if(!pushSupported()){
    if(isIosNotInstalled()){
      $("push-btn").style.display = "none";
      $("push-status").textContent = "First add this app to the Home Screen (Share → Add to Home Screen), then reminders become available here.";
    } else {
      $("push-card").classList.add("hidden");
    }
    return;
  }
  if(isIosNotInstalled()){
    $("push-btn").style.display = "none";
    $("push-status").textContent = "First add this app to the Home Screen (Share → Add to Home Screen), then open it from there to enable reminders.";
    return;
  }
  navigator.serviceWorker.register("./sw.js").then(function(reg){
    swReg = reg;
    return reg.pushManager.getSubscription();
  }).then(function(sub){
    setPushUI(!!sub);
  }).catch(function(e){ $("push-status").textContent = "Service worker error: " + e.message; });

  $("push-btn").onclick = function(){
    swReg.pushManager.getSubscription().then(function(existing){
      if(existing){
        var ep = existing.endpoint;
        existing.unsubscribe().then(function(){
          req("/api/unsubscribe", { method:"POST", body: JSON.stringify({ endpoint: ep }) });
          setPushUI(false, "Reminders disabled.");
        });
        return;
      }
      Notification.requestPermission().then(function(perm){
        if(perm !== "granted"){ setPushUI(false, "Notifications were not allowed."); return; }
        req("/api/vapid").then(function(v){
          return swReg.pushManager.subscribe({ userVisibleOnly:true, applicationServerKey: b64ToBytes(v.key) });
        }).then(function(sub){
          return req("/api/subscribe", { method:"POST", body: JSON.stringify({
            subscription: sub.toJSON(),
            intervalMinutes: Number($("push-interval").value),
            workStart: $("push-start").value || "09:00",
            workEnd: $("push-end").value || "19:00",
            tz: Intl.DateTimeFormat().resolvedOptions().timeZone
          })});
        }).then(function(){
          setPushUI(true, "Done — this phone will ask what you did, on your schedule.");
        }).catch(function(e){ setPushUI(false, "Failed: " + e.message); });
      });
    });
  };
}
