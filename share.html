<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#101216">
<title>Кинуть задачу — Focus Log</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root { --bg:#101216; --panel:#171a20; --card:#1d2129; --text:#eceef4; --muted:#9aa0af; --faint:#5c6270;
  --line:#262b35; --hair:#1c212a; --accent:#5b8def; --p1:#e5533c; --p2:#f2a65a; --p3:#5b8def; --green:#4fc1a6; }
html,body { background:var(--bg); color:var(--text); font:16px/1.45 -apple-system,"SF Pro Text","Segoe UI",system-ui,sans-serif; }
body { max-width:560px; margin:0 auto; }
button { font:inherit; color:inherit; background:none; border:none; cursor:pointer; }
main { padding:calc(env(safe-area-inset-top) + 26px) 18px 60px; }
.hidden { display:none !important; }
h1 { font-size:24px; font-weight:800; letter-spacing:-.02em; display:flex; align-items:center; gap:10px; margin-bottom:4px; }
h1 .pdot { width:13px; height:13px; border-radius:5px; background:var(--accent); flex-shrink:0; }
.sub { color:var(--muted); font-size:14px; margin-bottom:18px; }
.card { background:var(--panel); border:1px solid rgba(255,255,255,.05); border-radius:16px; padding:15px; margin:12px 0; }
.card h2 { font-size:11.5px; text-transform:uppercase; letter-spacing:.08em; color:var(--faint); margin-bottom:10px; font-weight:600; }
.in { width:100%; padding:12px 14px; background:var(--card); border:1px solid rgba(255,255,255,.05); border-radius:12px; color:var(--text); font-size:15px; outline:none; margin-top:8px; font-family:inherit; }
.in:focus { border-color:var(--accent); }
textarea.in { resize:vertical; min-height:74px; }
.primary { background:var(--accent); border-radius:12px; color:#fff; padding:13px 16px; font-size:15px; font-weight:600; width:100%; margin-top:12px; }
.primary:disabled { opacity:.5; }
.center { text-align:center; color:var(--faint); font-size:13.5px; padding:30px 16px; line-height:1.6; }
.ok { color:var(--green); font-size:14px; text-align:center; padding:10px 0 2px; }
.err { color:var(--p1); font-size:13.5px; text-align:center; padding:10px 0 2px; }
.trow { display:flex; align-items:flex-start; gap:12px; padding:11px 0; border-bottom:1px solid var(--hair); }
.trow:last-child { border-bottom:none; }
.tdot { width:20px; height:20px; border-radius:50%; border:1.8px solid #4a5160; flex-shrink:0; margin-top:1px; position:relative; }
.tdot.p1 { border-color:var(--p1); background:rgba(229,83,60,.13); }
.tdot.p2 { border-color:var(--p2); background:rgba(242,166,90,.13); }
.tdot.p3 { border-color:var(--p3); background:rgba(91,141,239,.13); }
.trow.done .tdot { background:#4a5160; border-color:#4a5160; }
.trow.done .tdot::after { content:''; position:absolute; left:5.5px; top:2.5px; width:4.5px; height:8.5px; border:solid var(--bg); border-width:0 2px 2px 0; transform:rotate(43deg); }
.tmain { flex:1; min-width:0; }
.tx { font-size:15px; line-height:1.4; }
.trow.done .tx { color:var(--faint); text-decoration:line-through; }
.meta { display:flex; gap:12px; margin-top:3px; font-size:12.5px; color:var(--faint); }
.meta .late { color:var(--p1); }
.foot { text-align:center; color:var(--faint); font-size:12px; margin-top:26px; }
</style>
</head>
<body>
<main>
  <div id="loading" class="center">Открываю проект…</div>
  <div id="dead" class="center hidden">Ссылка не работает — её отозвали или проект удалён.<br>Попроси новую у владельца.</div>

  <div id="app" class="hidden">
    <h1><span class="pdot" id="pdot"></span><span id="pname">Проект</span></h1>
    <p class="sub">Задача попадёт владельцу проекта во «Входящие».</p>

    <div class="card">
      <h2>Кинуть задачу</h2>
      <input type="text" class="in" id="f-author" placeholder="Твоё имя (видно владельцу)" autocomplete="name" maxlength="60">
      <textarea class="in" id="f-text" placeholder="Что нужно сделать?" maxlength="300"></textarea>
      <textarea class="in" id="f-note" placeholder="Деталь / ссылка (необязательно)" maxlength="2000"></textarea>
      <button class="primary" id="f-send">Отправить</button>
      <div id="f-ok" class="ok hidden">✓ Улетело — владелец увидит во «Входящих».</div>
      <div id="f-err" class="err hidden"></div>
    </div>

    <div class="card hidden" id="tasks-card">
      <h2>Открытые задачи проекта <span id="tcount" style="color:var(--faint);text-transform:none;letter-spacing:0"></span></h2>
      <div id="tasks"></div>
    </div>
  </div>
  <p class="foot">15-Minute Focus Log</p>
</main>

<script>
var API = "https://nmpomxomlhxyywgbgpfd.supabase.co/functions/v1/focuslog";
var token = new URLSearchParams(location.search).get("t") || "";
function $(id){ return document.getElementById(id); }

function fmtDay(dk){
  if(!dk) return null;
  var p = dk.split("-");
  var d = new Date(+p[0], +p[1]-1, +p[2]);
  return d.toLocaleDateString("ru-RU", { day:"numeric", month:"short" }).replace(/\.$/, "");
}

function die(){ $("loading").classList.add("hidden"); $("dead").classList.remove("hidden"); }

if(!/^[0-9a-f-]{36}$/i.test(token)){ die(); }
else fetch(API + "/api/share/" + token).then(function(r){
  if(!r.ok) throw 0;
  return r.json();
}).then(function(info){
  $("loading").classList.add("hidden");
  $("app").classList.remove("hidden");
  $("pname").textContent = info.project.name;
  if(info.project.color) $("pdot").style.background = info.project.color;
  document.title = info.project.name + " — Focus Log";
  var saved = localStorage.getItem("fl-share-name");
  if(saved) $("f-author").value = saved;

  if(info.canView && info.tasks){
    var open = info.tasks.filter(function(t){ return !t.done; });
    $("tasks-card").classList.remove("hidden");
    $("tcount").textContent = open.length ? "· " + open.length : "";
    var box = $("tasks");
    if(!open.length) box.innerHTML = '<p class="center" style="padding:12px">Открытых задач нет.</p>';
    var today = new Date(); var pad = function(n){ return (n<10?"0":"")+n; };
    var tk = today.getFullYear()+"-"+pad(today.getMonth()+1)+"-"+pad(today.getDate());
    open.forEach(function(t){
      var row = document.createElement("div");
      row.className = "trow";
      var dot = document.createElement("span");
      dot.className = "tdot" + (t.priority ? " p"+t.priority : "");
      var mainEl = document.createElement("div");
      mainEl.className = "tmain";
      var tx = document.createElement("div");
      tx.className = "tx";
      tx.textContent = t.text;
      mainEl.appendChild(tx);
      var bits = [];
      if(t.day) bits.push({ txt:"📅 " + fmtDay(t.day), late: t.day < tk });
      if(t.deadline) bits.push({ txt:"до " + fmtDay(t.deadline), late: t.deadline <= tk });
      if(bits.length){
        var meta = document.createElement("div");
        meta.className = "meta";
        bits.forEach(function(b){
          var s = document.createElement("span");
          if(b.late) s.className = "late";
          s.textContent = b.txt;
          meta.appendChild(s);
        });
        mainEl.appendChild(meta);
      }
      row.append(dot, mainEl);
      box.appendChild(row);
    });
  }
}).catch(die);

$("f-send").addEventListener("click", function(){
  var text = $("f-text").value.trim();
  $("f-ok").classList.add("hidden");
  $("f-err").classList.add("hidden");
  if(!text){ $("f-text").focus(); return; }
  var btn = $("f-send");
  btn.disabled = true;
  localStorage.setItem("fl-share-name", $("f-author").value.trim());
  fetch(API + "/api/share/" + token + "/task", {
    method: "POST",
    headers: { "content-type": "application/json" },
    body: JSON.stringify({
      text: text,
      note: $("f-note").value.trim() || null,
      author: $("f-author").value.trim() || null
    })
  }).then(function(r){ return r.json().then(function(b){ return { ok:r.ok, b:b }; }); })
    .then(function(res){
      btn.disabled = false;
      if(!res.ok){ $("f-err").textContent = res.b.error || "Не получилось, попробуй ещё раз."; $("f-err").classList.remove("hidden"); return; }
      $("f-text").value = ""; $("f-note").value = "";
      $("f-ok").classList.remove("hidden");
    })
    .catch(function(){ btn.disabled = false; $("f-err").textContent = "Нет сети — попробуй ещё раз."; $("f-err").classList.remove("hidden"); });
});
</script>
</body>
</html>
